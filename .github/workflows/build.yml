name: Build

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Publish manifest with explicit arm64v8 variant
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT

          while IFS= read -r tag; do
            if [ -z "$tag" ]; then
              continue
            fi

            raw="$(docker buildx imagetools inspect --raw "$tag")"

            printf '%s' "$raw" |
              jq -c '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64")' \
                > "$tmpdir/amd64.json"

            printf '%s' "$raw" |
              jq -c '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64") | .platform.variant = "v8"' \
                > "$tmpdir/arm64v8.json"

            docker buildx imagetools create \
              --tag "$tag" \
              -f "$tmpdir/amd64.json" \
              -f "$tmpdir/arm64v8.json"
          done <<< "$TAGS"
